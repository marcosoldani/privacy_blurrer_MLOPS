name: MLOps Pipeline CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install black flake8 pytest-cov

      - name: Lint with Black
        run: black --check src/ tests/ scripts/ --line-length 100

      - name: Lint with Flake8
        run: flake8 src/ tests/ scripts/ --max-line-length=100 --extend-ignore=E203,W503

      - name: Run tests with pytest + coverage
        run: pytest tests/ --cov=src --cov-report=term-missing --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml
